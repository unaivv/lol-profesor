name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Sync version from tag
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME#v}
          npm pkg set version="$TAG"
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p));
            c.version = '$TAG';
            fs.writeFileSync(p, JSON.stringify(c, null, 4));
          "

      - name: Install frontend dependencies
        run: npm install

      - name: Install Tauri CLI
        run: cd src-tauri && npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'LoL Professor v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload updater signatures to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF_NAME}

          echo "Looking for .sig files..."
          find src-tauri/target -path "*/bundle/*" -name "*.sig" 2>/dev/null | tee /tmp/sig_files.txt || true

          if [ ! -s /tmp/sig_files.txt ]; then
            echo "No .sig files found — signing may not be configured"
            exit 0
          fi

          # Wait for the release to exist (tauri-action creates it asynchronously)
          RELEASE_ID=""
          for i in $(seq 1 10); do
            RELEASE_ID=$(curl -sf \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
              | jq -r '.id // empty')
            [ -n "$RELEASE_ID" ] && break
            echo "Waiting for release to be created... ($i/10)"
            sleep 15
          done

          if [ -z "$RELEASE_ID" ]; then
            echo "Could not find release for tag $TAG"
            exit 1
          fi
          echo "Release ID: $RELEASE_ID"

          # Upload each .sig file
          while read -r sig_file; do
            name=$(basename "$sig_file")
            encoded=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$name")
            echo "Uploading: $name"
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: text/plain" \
              --data-binary @"$sig_file" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=$encoded")
            echo "  → HTTP $HTTP"
          done < /tmp/sig_files.txt

  update-manifest:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION=${TAG#v}

          # Fetch release JSON
          for i in $(seq 1 10); do
            RELEASE_JSON=$(curl -sf \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/releases/tags/$TAG") && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

          RELEASE_ID=$(echo "$RELEASE_JSON" | jq -r '.id')
          PUB_DATE=$(echo "$RELEASE_JSON" | jq -r '.published_at')
          NOTES=$(echo "$RELEASE_JSON" | jq -r '.body // "See release assets."')

          echo "Release ID: $RELEASE_ID"
          echo "All assets:"
          echo "$RELEASE_JSON" | jq -r '.assets[].name'

          # Helper: get browser_download_url matching a pattern
          get_url() {
            echo "$RELEASE_JSON" | jq -r ".assets[] | select(.name | test(\"$1\")) | .browser_download_url" | head -1
          }

          # Helper: download a .sig asset
          get_sig() {
            local url
            url=$(echo "$RELEASE_JSON" | jq -r ".assets[] | select(.name | test(\"$1\")) | .browser_download_url" | head -1)
            if [ -z "$url" ]; then
              echo ""
              return
            fi
            curl -sL -H "Authorization: token $GITHUB_TOKEN" "$url"
          }

          # macOS aarch64 — bundle has no version in name
          MAC_URL=$(get_url 'aarch64\.app\.tar\.gz$')
          MAC_SIG=$(get_sig 'aarch64\.app\.tar\.gz\.sig$')

          # Linux x86_64
          LINUX_URL=$(get_url 'amd64\.AppImage$')
          LINUX_SIG=$(get_sig 'amd64\.AppImage\.sig$')

          # Windows x86_64 (NSIS)
          WIN_URL=$(get_url 'x64-setup\.exe$')
          WIN_SIG=$(get_sig 'x64-setup\.exe\.sig$')

          echo "MAC_URL:        $MAC_URL"
          echo "MAC_SIG length: ${#MAC_SIG}"
          echo "LINUX_URL:      $LINUX_URL"
          echo "LINUX_SIG len:  ${#LINUX_SIG}"
          echo "WIN_URL:        $WIN_URL"
          echo "WIN_SIG length: ${#WIN_SIG}"

          if [ -z "$MAC_SIG" ] && [ -z "$LINUX_SIG" ] && [ -z "$WIN_SIG" ]; then
            echo "ERROR: No signatures found. Check that TAURI_SIGNING_PRIVATE_KEY is set and .sig files were uploaded."
            exit 1
          fi

          # Build latest.json using jq for correct JSON escaping
          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg mac_url "$MAC_URL" \
            --arg mac_sig "$MAC_SIG" \
            --arg linux_url "$LINUX_URL" \
            --arg linux_sig "$LINUX_SIG" \
            --arg win_url "$WIN_URL" \
            --arg win_sig "$WIN_SIG" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $mac_sig, url: $mac_url },
                "linux-x86_64": { signature: $linux_sig, url: $linux_url },
                "windows-x86_64": { signature: $win_sig, url: $win_url }
              }
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

          # Delete previous latest.json if it exists (re-upload after fixing sigs)
          OLD_ID=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name == "latest.json") | .id' | head -1)
          if [ -n "$OLD_ID" ]; then
            echo "Deleting old latest.json (asset $OLD_ID)..."
            curl -sf -X DELETE \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/releases/assets/$OLD_ID"
          fi

          # Upload latest.json
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @latest.json \
            "https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=latest.json")

          echo "Upload HTTP status: $HTTP"
          [ "$HTTP" = "201" ] || { echo "Upload failed"; exit 1; }
          echo "latest.json uploaded successfully"
