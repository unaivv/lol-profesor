name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Sync version from tag
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME#v}
          npm pkg set version="$TAG"
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p));
            c.version = '$TAG';
            fs.writeFileSync(p, JSON.stringify(c, null, 4));
          "

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cd src-tauri && npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'LoL Professor v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Generate latest.json for updater
        if: matrix.platform == 'macos-latest'
        run: |
          TAG=${GITHUB_REF_NAME#v}
          # Get the dmg asset URL
          ASSET_URL=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v$TAG" | \
            jq -r '.assets[] | select(.name | endswith(".dmg")) | .browser_download_url' | head -1)
          
          # Create latest.json in required format
          cat > latest.json << EOF
          {
            "version": "$TAG",
            "notes": "See the assets to download this version and install.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "",
                "url": "$ASSET_URL"
              }
            }
          }
          EOF
          
          # Upload latest.json to release
          curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data-binary @latest.json \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/tags/v$TAG/assets?name=latest.json"
