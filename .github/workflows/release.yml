name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Sync version from tag
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME#v}
          npm pkg set version="$TAG"
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p));
            c.version = '$TAG';
            fs.writeFileSync(p, JSON.stringify(c, null, 4));
          "

      - name: Install frontend dependencies
        run: npm install

      - name: Install Tauri CLI
        run: cd src-tauri && npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'LoL Professor v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  update-manifest:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install tauri-cli
        run: cargo binstall tauri-cli --no-confirm --locked

      - name: Generate signatures and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          VERSION=${TAG#v}

          # Fetch release
          RELEASE_JSON=$(curl -sf \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG")

          RELEASE_ID=$(echo "$RELEASE_JSON" | jq -r '.id')
          PUB_DATE=$(echo "$RELEASE_JSON" | jq -r '.published_at')
          NOTES=$(echo "$RELEASE_JSON" | jq -r '.body // "See release assets."')

          echo "Release ID: $RELEASE_ID"
          echo "Assets:"
          echo "$RELEASE_JSON" | jq -r '.assets[].name'

          get_url() {
            echo "$RELEASE_JSON" | jq -r --arg pat "$1" '.assets[] | select(.name | test($pat)) | .browser_download_url' | head -1
          }

          MAC_URL=$(get_url 'aarch64\.app\.tar\.gz$')
          LINUX_URL=$(get_url 'amd64\.AppImage$')
          WIN_URL=$(get_url 'x64-setup\.exe$')

          echo "MAC_URL:   $MAC_URL"
          echo "LINUX_URL: $LINUX_URL"
          echo "WIN_URL:   $WIN_URL"

          # Download a bundle, sign it, return the .sig content
          sign_bundle() {
            local url=$1 local_file=$2
            if [ -z "$url" ]; then
              echo ""
              return
            fi
            echo "Downloading $local_file..." >&2
            curl -sL -H "Authorization: token $GITHUB_TOKEN" "$url" -o "$local_file"
            echo "Signing $local_file..." >&2
            cargo tauri signer sign \
              --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
              --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
              "$local_file" >&2
            cat "${local_file}.sig"
          }

          MAC_SIG=$(sign_bundle "$MAC_URL" "mac.app.tar.gz")
          LINUX_SIG=$(sign_bundle "$LINUX_URL" "linux.AppImage")
          WIN_SIG=$(sign_bundle "$WIN_URL" "win-setup.exe")

          echo "MAC_SIG length:   ${#MAC_SIG}"
          echo "LINUX_SIG length: ${#LINUX_SIG}"
          echo "WIN_SIG length:   ${#WIN_SIG}"

          if [ -z "$MAC_SIG" ] && [ -z "$LINUX_SIG" ] && [ -z "$WIN_SIG" ]; then
            echo "ERROR: All signatures empty. Check TAURI_SIGNING_PRIVATE_KEY secret."
            exit 1
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg mac_url "$MAC_URL" \
            --arg mac_sig "$MAC_SIG" \
            --arg linux_url "$LINUX_URL" \
            --arg linux_sig "$LINUX_SIG" \
            --arg win_url "$WIN_URL" \
            --arg win_sig "$WIN_SIG" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $mac_sig, url: $mac_url },
                "linux-x86_64":   { signature: $linux_sig, url: $linux_url },
                "windows-x86_64": { signature: $win_sig, url: $win_url }
              }
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

          # Delete previous latest.json if exists
          OLD_ID=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name == "latest.json") | .id' | head -1)
          if [ -n "$OLD_ID" ]; then
            echo "Removing old latest.json (asset $OLD_ID)..."
            curl -sf -X DELETE \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/releases/assets/$OLD_ID"
          fi

          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @latest.json \
            "https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=latest.json")

          echo "Upload status: $HTTP"
          [ "$HTTP" = "201" ] || { echo "Upload failed"; exit 1; }
          echo "Done — latest.json uploaded successfully"
