version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - VITE_PORT=3001
      - VITE_HOST=0.0.0.0
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - lol-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=development
      - PORT=5001
      - RIOT_API_KEY=${RIOT_API_KEY:-RGAPI-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx}
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - lol-network
    depends_on:
      - frontend

networks:
  lol-network:
    driver: bridge